<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐黄智筛 · GQD-DKD 数据架构指挥中心 v2.0 卡片瀑布版</title>
<style>
:root {
  --bg-deep: #06080f;
  --bg-primary: #0a0e1a;
  --bg-card: rgba(15, 23, 42, 0.9);
  --bg-card-hover: rgba(20, 30, 55, 0.95);
  --border: rgba(0, 137, 59, 0.25);
  --border-bright: rgba(0, 212, 255, 0.5);
  /* 阶段主题色 */
  --quality: #00893b;
  --quality-bright: #00d97e;
  --efficacy: #00d4ff;
  --mechanism: #a855f7;
  --invivo: #ff8c42;
  --decision: #ffd700;
  --green: #00893b;
  --green-bright: #00d97e;
  --cyan: #00d4ff;
  --yellow: #ffd700;
  --red: #ff4757;
  --purple: #a855f7;
  --orange: #ff8c42;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-faint: #475569;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  color: var(--text); overflow-x: hidden; min-height: 100vh;
}
/* 背景网格 */
body::before {
  content: ''; position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(0,137,59,0.08), transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(0,212,255,0.06), transparent 50%),
    linear-gradient(rgba(0,137,59,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,137,59,0.03) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
}
.app { max-width: 1920px; margin: 0 auto; padding: 16px; }

/* === Header === */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px;
  backdrop-filter: blur(20px);
}
.header h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--green-bright), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-meta { display: flex; gap: 12px; align-items: center; }
.meta-chip {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  color: var(--text-dim);
}
.meta-chip strong { color: var(--cyan); }

/* === V2 主布局：左侧流水线(flex-grow) + 右侧侧边栏(420px) === */
.layout {
  display: flex; gap: 14px; align-items: flex-start;
}
.layout-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
.layout-right {
  width: 420px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px;
  position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto;
}
.layout-right::-webkit-scrollbar { width: 4px; }
.layout-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.dash-section-title {
  font-size: 12px; font-weight: 700; color: var(--cyan);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.dash-section-title::before {
  content: ''; width: 3px; height: 14px; background: var(--green-bright); border-radius: 2px;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* === 通用卡片 === */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; margin-bottom: 0;
  backdrop-filter: blur(20px); transition: all 0.3s;
}
.card:hover { border-color: rgba(0,137,59,0.4); }
.card-title {
  font-size: 14px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px; color: var(--text);
}
.card-title::before {
  content: ''; width: 3px; height: 16px; border-radius: 2px;
  background: linear-gradient(180deg, var(--green-bright), var(--cyan));
}
.muted { color: var(--text-dim); font-size: 12px; }
.faint { color: var(--text-faint); font-size: 11px; }
.mono { font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace; }

/* ========================================
   V2 卡片瀑布：流水线渲染
   ======================================== */
.cascade-canvas {
  width: 100%; min-height: 520px; padding: 8px 4px;
}
/* 5列阶段容器 */
.cascade-columns {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  align-items: start;
}
/* 每列（阶段） */
.cascade-column {
  display: flex; flex-direction: column; gap: 10px;
}
/* 阶段头部 */
.cascade-phase-head {
  text-align: center; padding: 10px 6px; border-radius: 10px;
  font-size: 13px; font-weight: 700; margin-bottom: 4px;
  border: 1px solid; position: relative;
}
.cascade-phase-head .phase-num {
  display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px;
}
.cascade-phase-head .phase-total {
  position: absolute; top: 4px; right: 6px; font-size: 9px;
  background: rgba(0,0,0,0.5); padding: 1px 6px; border-radius: 8px; font-weight: 600;
}
.cascade-phase-head.quality { color: var(--quality-bright); background: rgba(0,137,59,0.12); border-color: rgba(0,217,126,0.4); }
.cascade-phase-head.efficacy { color: var(--efficacy); background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.4); }
.cascade-phase-head.mechanism { color: var(--mechanism); background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.4); }
.cascade-phase-head.invivo { color: var(--invivo); background: rgba(255,140,66,0.12); border-color: rgba(255,140,66,0.4); }
.cascade-phase-head.decision { color: var(--decision); background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.4); }

/* 数据卡片 */
.data-card {
  position: relative; background: var(--bg-card); border-radius: 10px;
  padding: 12px 12px 12px 16px; cursor: pointer; transition: all 0.3s;
  border: 1px solid rgba(255,255,255,0.06);
  border-left-width: 4px; animation: fadeIn 0.4s ease both;
}
.data-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.data-card.quality { border-left-color: var(--quality-bright); }
.data-card.efficacy { border-left-color: var(--efficacy); }
.data-card.mechanism { border-left-color: var(--mechanism); }
.data-card.invivo { border-left-color: var(--invivo); }
.data-card.decision { border-left-color: var(--decision); }
.data-card.quality:hover { box-shadow: 0 8px 24px rgba(0,217,126,0.25); }
.data-card.efficacy:hover { box-shadow: 0 8px 24px rgba(0,212,255,0.25); }
.data-card.mechanism:hover { box-shadow: 0 8px 24px rgba(168,85,247,0.25); }
.data-card.invivo:hover { box-shadow: 0 8px 24px rgba(255,140,66,0.25); }
.data-card.decision:hover { box-shadow: 0 8px 24px rgba(255,215,0,0.25); }

/* 卡片头：ID徽章 + 记录数 */
.data-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card-badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; padding: 2px 8px; border-radius: 6px;
  font-family: 'Cascadia Code', monospace;
}
.data-card.quality .card-badge { background: rgba(0,217,126,0.18); color: var(--quality-bright); }
.data-card.efficacy .card-badge { background: rgba(0,212,255,0.18); color: var(--efficacy); }
.data-card.mechanism .card-badge { background: rgba(168,85,247,0.18); color: var(--mechanism); }
.data-card.invivo .card-badge { background: rgba(255,140,66,0.18); color: var(--invivo); }
.data-card.decision .card-badge { background: rgba(255,215,0,0.18); color: var(--decision); }

.card-records {
  font-size: 11px; font-weight: 700; color: var(--text); font-family: monospace;
}
.card-records .unit { font-size: 9px; color: var(--text-faint); font-weight: 400; margin-left: 2px; }

.card-name { font-size: 13px; color: var(--text); line-height: 1.35; margin-bottom: 4px; }

/* 反馈标签（卡片底部色带） */
.card-feedback-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.fb-tag {
  font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.fb-tag.triggered { background: rgba(255,71,87,0.2); color: var(--red); border: 1px solid rgba(255,71,87,0.5); }
.fb-tag.resolved { background: rgba(0,217,126,0.2); color: var(--green-bright); border: 1px solid rgba(0,217,126,0.5); }
.fb-tag.pending { background: rgba(255,215,0,0.12); color: var(--yellow); border: 1px solid rgba(255,215,0,0.4); }
.fb-tag:hover { transform: scale(1.08); }

/* 审核关卡标记 */
.gate-marker {
  position: absolute; top: -7px; right: -7px; width: 22px; height: 22px;
  border-radius: 50%; background: var(--bg-deep); border: 2px solid var(--yellow);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--yellow);
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
  animation: gatePulse 3s infinite;
}
@keyframes gatePulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.4); }
  50% { box-shadow: 0 0 20px rgba(255,215,0,0.7); }
}

/* 列间流向箭头（→）叠在列间gap上 */
.flow-arrow-col {
  position: relative;
}
.flow-arrow-col::after {
  content: '→'; position: absolute; top: 50%; right: -13px; transform: translateY(-50%);
  font-size: 18px; color: var(--text-faint); pointer-events: none; z-index: 2;
  text-shadow: 0 0 6px rgba(0,212,255,0.3);
}
.cascade-column:last-child .flow-arrow-col::after { display: none; }

/* 决策卡片特殊样式 */
.data-card.decision {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(15,23,42,0.95));
  border: 1px solid rgba(255,215,0,0.4);
}
.data-card.decision .card-name { color: var(--decision); font-weight: 600; }

/* === 反馈回路列表 === */
.feedback-list-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.feedback-list-item:last-child { border-bottom: none; }

/* === 审核关卡列表 === */
.gate-list-item {
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.gate-list-item:last-child { border-bottom: none; }

/* === 抽屉详情面板 === */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: -560px; width: 540px; height: 100vh;
  background: var(--bg-primary); border-left: 1px solid var(--border-bright);
  z-index: 101; transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto; padding: 20px;
}
.drawer.open { right: 0; }
.drawer-close {
  position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
  border-radius: 50%; background: rgba(255,71,87,0.15); border: 1px solid var(--red);
  color: var(--red); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.drawer-close:hover { background: rgba(255,71,87,0.3); }
.drawer h2 { font-size: 18px; margin-bottom: 4px; }
.drawer .drawer-q { font-size: 13px; color: var(--cyan); margin-bottom: 16px; line-height: 1.5; }

/* 端口表 */
.port-table { width: 100%; margin: 8px 0; }
.port-row {
  display: grid; grid-template-columns: 100px 1fr; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px;
}
.port-label { color: var(--text-dim); }
.port-value { color: var(--text); }
.port-value.mono { font-size: 11px; color: var(--green-bright); }

/* 数据样本表 */
.data-sample {
  background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px;
  margin: 8px 0; max-height: 240px; overflow-y: auto; font-size: 11px;
}
.data-sample table { width: 100%; border-collapse: collapse; }
.data-sample th { text-align: left; color: var(--cyan); padding: 4px 8px; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
.data-sample td { padding: 3px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-dim); }
.data-sample tr:hover td { background: rgba(0,137,59,0.05); }

/* 血缘链（抽屉内） */
.lineage-chain { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin: 8px 0; }
.lineage-node {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
}
.lineage-node.source { background: rgba(0,212,255,0.15); border: 1px solid var(--cyan); color: var(--cyan); }
.lineage-node.process { background: rgba(0,217,126,0.15); border: 1px solid var(--green-bright); color: var(--green-bright); }
.lineage-node.decision { background: rgba(255,215,0,0.15); border: 1px solid var(--yellow); color: var(--yellow); }
.lineage-arrow { color: var(--text-faint); font-size: 14px; }

/* ========================================
   数据底座三层架构（侧边栏）
   ======================================== */
.stack-layer {
  display: grid; grid-template-columns: 60px 1fr; gap: 12px; align-items: start;
  margin-bottom: 12px; padding: 12px; border-radius: 10px;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  transition: all 0.3s; cursor: pointer;
}
.stack-layer:last-child { margin-bottom: 0; }
.stack-layer:hover { border-color: var(--border-bright); transform: translateX(4px); }
.stack-layer.l1 { border-left: 4px solid var(--cyan); }
.stack-layer.l2 { border-left: 4px solid var(--green-bright); }
.stack-layer.l3 { border-left: 4px solid var(--purple); }
.stack-badge {
  text-align: center; padding: 10px 4px; border-radius: 8px;
  font-size: 20px; font-weight: 800;
}
.stack-badge.l1 { background: rgba(0,212,255,0.1); color: var(--cyan); border: 2px solid var(--cyan); }
.stack-badge.l2 { background: rgba(0,217,126,0.1); color: var(--green-bright); border: 2px solid var(--green-bright); }
.stack-badge.l3 { background: rgba(168,85,247,0.1); color: var(--purple); border: 2px solid var(--purple); }
.stack-badge .stack-name { font-size: 9px; font-weight: 400; margin-top: 2px; color: var(--text-dim); }
.stack-body h3 { font-size: 13px; margin-bottom: 4px; }
.stack-body .role { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; line-height: 1.4; }
.stack-body .stores { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
.store-tag {
  font-size: 9px; padding: 1px 6px; border-radius: 4px;
  background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--text-dim);
}

/* L1下钻：数据仪表盘 */
.data-dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-top: 10px; }
.dash-cell {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; text-align: center; cursor: pointer; transition: all 0.3s;
}
.dash-cell:hover { border-color: var(--cyan); background: rgba(0,212,255,0.05); transform: translateY(-2px); }
.dash-cell .dash-val { font-size: 20px; font-weight: 800; color: var(--cyan); }
.dash-cell .dash-label { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.dash-cell .dash-pct { font-size: 9px; color: var(--text-faint); }

/* L2图谱拓扑 */
.graph-topology {
  position: relative; width: 100%; height: 340px; margin-top: 10px;
  background: radial-gradient(ellipse at center, rgba(0,137,59,0.06), transparent 70%);
  border-radius: 10px; border: 1px solid var(--border);
}
.graph-svg { width: 100%; height: 100%; }
.graph-node-circle {
  cursor: pointer; transition: all 0.3s;
  filter: drop-shadow(0 0 4px currentColor);
}
.graph-node-circle:hover { r: 22; }
.graph-node-label { font-size: 9px; fill: var(--text-dim); text-anchor: middle; pointer-events: none; }
.graph-edge { stroke: rgba(0,137,59,0.2); stroke-width: 1; }
.graph-edge.highlighted { stroke: var(--cyan); stroke-width: 2; }

/* L3 AI消费路径 */
.ai-path-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.ai-path-card {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; cursor: pointer; transition: all 0.3s;
}
.ai-path-card:hover { border-color: var(--purple); background: rgba(168,85,247,0.05); }
.ai-path-card h4 { font-size: 12px; color: var(--purple); margin-bottom: 4px; }
.ai-path-card .desc { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; line-height: 1.4; }
.ai-path-card .demo {
  font-family: monospace; font-size: 9px; background: rgba(0,0,0,0.5);
  padding: 8px; border-radius: 4px; color: var(--green-bright);
  max-height: 0; overflow: hidden; transition: max-height 0.4s;
}
.ai-path-card.expanded .demo { max-height: 280px; overflow-y: auto; }

/* ========================================
   MCDM预测引擎（侧边栏）
   ======================================== */
.slider-group { margin-bottom: 14px; }
.slider-group h4 {
  font-size: 12px; margin-bottom: 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
}
.slider-group.tier-l1 h4 { color: var(--red); }
.slider-group.tier-l2 h4 { color: var(--cyan); }
.slider-group.tier-l3 h4 { color: var(--purple); }
.slider-row {
  display: grid; grid-template-columns: 110px 1fr 38px 42px; gap: 6px;
  align-items: center; padding: 5px 0; font-size: 11px;
}
.slider-row input[type=range] {
  -webkit-appearance: none; height: 5px; border-radius: 3px; outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--text); cursor: pointer; border: 2px solid var(--bg-deep);
  box-shadow: 0 0 6px currentColor;
}
.slider-row.l1 input[type=range] { background: linear-gradient(90deg, var(--red), rgba(255,71,87,0.2)); }
.slider-row.l2 input[type=range] { background: linear-gradient(90deg, var(--cyan), rgba(0,212,255,0.2)); }
.slider-row.l3 input[type=range] { background: linear-gradient(90deg, var(--purple), rgba(168,85,247,0.2)); }
.score-val { font-weight: 700; text-align: right; }
.weight-val { font-size: 9px; color: var(--text-faint); text-align: right; }

.score-display { text-align: center; padding: 14px; }
.score-big {
  font-size: 48px; font-weight: 800;
  background: linear-gradient(135deg, var(--green-bright), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.score-label { font-size: 11px; color: var(--text-dim); }
.score-verdict {
  display: inline-block; margin-top: 6px; font-size: 16px; font-weight: 700;
  padding: 4px 18px; border-radius: 8px;
}
.score-verdict.go { background: rgba(0,217,126,0.2); color: var(--green-bright); border: 1px solid var(--green-bright); }
.score-verdict.nogo { background: rgba(255,71,87,0.2); color: var(--red); border: 1px solid var(--red); }
.score-breakdown { display: flex; justify-content: space-around; margin-top: 10px; font-size: 11px; }
.score-breakdown-item { text-align: center; }
.score-breakdown-val { font-size: 16px; font-weight: 700; }

.preset-btns { display: flex; gap: 6px; margin-top: 10px; }
.preset-btn {
  flex: 1; padding: 7px 4px; font-size: 10px; cursor: pointer; border-radius: 6px;
  border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: var(--text-dim);
  transition: all 0.3s; text-align: center;
}
.preset-btn:hover { color: var(--text); border-color: var(--cyan); }
.preset-btn.active { background: rgba(0,212,255,0.15); color: var(--cyan); border-color: var(--cyan); }

/* 滚动容器 */
.layout-right .card { max-height: none; }
#sliderPanel { max-height: 380px; overflow-y: auto; }
#sliderPanel::-webkit-scrollbar { width: 3px; }
#sliderPanel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 图例（流水线下方） */
.cascade-legend {
  display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; padding: 10px 14px;
  background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 11px; color: var(--text-dim);
}
.cascade-legend .leg-item { display: flex; align-items: center; gap: 5px; }
.cascade-legend .leg-color { width: 14px; height: 4px; border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🔬 岐黄智筛 · GQD-DKD 数据架构指挥中心 <span style="color:var(--green-bright);-webkit-text-fill-color:var(--green-bright)">v2.0 卡片瀑布</span></h1>
    <div class="header-meta">
      <span class="meta-chip"><strong id="metaBlocks">13</strong> 切块</span>
      <span class="meta-chip"><strong id="metaRecords">29790</strong> 条记录</span>
      <span class="meta-chip"><strong>3</strong> 审核门</span>
      <span class="meta-chip"><strong>7</strong> 反馈回路</span>
      <span class="meta-chip"><strong id="metaDecision">GO</strong></span>
      <span class="meta-chip" style="color:var(--green-bright)">v2.0</span>
    </div>
  </div>

  <div class="layout">
    <!-- ====== 左侧：流水线全景 + 反馈 + 关卡 ====== -->
    <div class="layout-left">
      <div class="card">
        <div class="dash-section-title">🔄 数据流水线 · 卡片瀑布（5阶段 → 药材到决策）</div>
        <div class="muted" style="margin-bottom:10px;font-size:11px">
          点击任意卡片查看孪生数据 · 列间 <span style="color:var(--cyan)">→</span> 表示流向 · 🔴红色标签=触发反馈 · 🟢绿色标签=已解除 · ⬡黄色圆=审核关卡
        </div>
        <div class="cascade-canvas" id="pipelineCanvas">
          <!-- renderPipeline() 注入 5列瀑布 -->
        </div>
        <div class="cascade-legend" id="cascadeLegend"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="card">
          <div class="dash-section-title">🔗 反馈回路 · 数据的环状流动</div>
          <div id="feedbackList"></div>
        </div>
        <div class="card">
          <div class="dash-section-title">⬡ 审核关卡 · 人机协同决策</div>
          <div id="gateList"></div>
        </div>
      </div>
    </div>

    <!-- ====== 右侧：底座架构 + MCDM引擎 + 调参 ====== -->
    <div class="layout-right">
      <div class="card">
        <div class="dash-section-title">🏗️ 数据底座 · 三层架构</div>
        <div class="muted" style="margin-bottom:10px;font-size:11px">L1事实 → L2图谱 → L3检索 · 点击下钻</div>
        <div id="stackLayers"></div>
      </div>
      <div class="card">
        <div class="dash-section-title">📊 MCDM 实时评分</div>
        <div id="scorePanel" style="margin-bottom:10px"></div>
        <canvas id="radarCanvas" width="400" height="320" style="width:100%;max-width:380px;display:block;margin:0 auto"></canvas>
      </div>
      <div class="card">
        <div class="dash-section-title">🎛️ 12维度调参 · 拖动实时联动</div>
        <div id="sliderPanel"></div>
        <div id="presetBtns" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<!-- 抽屉 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawerContent"></div>
</div>

<script>
let DATA=null, FULL=null;

// ====== 数据加载 ======
async function loadData() {
  try {
    DATA = await (await fetch('gqd-dkd-summary.json')).json();
    FULL = null; // 孪生详情按需加载
    document.getElementById('metaRecords').textContent = DATA.meta.dataScale?.full?.replace('~','') || '29790';
    document.getElementById('metaDecision').textContent = DATA.blocks.find(b=>b.id==='G1')?.virtualData_summary?.decision || 'GO';
    renderPipeline();
    renderStack();
    renderEngine();
  } catch(e) {
    console.error(e);
    document.querySelector('.app').insertAdjacentHTML('afterbegin',
      `<div style="color:var(--red);padding:12px;background:rgba(255,71,87,0.1);border-radius:8px;margin-bottom:12px">⚠️ 数据加载失败: ${e.message}. 请确保通过HTTP服务器访问（python -m http.server 5180）</div>`);
  }
}

function switchView() {}

// ========================================
// V2：数据流水线 · 卡片瀑布渲染（5列阶段）
// ========================================
const PHASE_MAP = {'B1':'quality','B2':'quality','B3':'quality','C1':'efficacy','C2':'efficacy','C3':'efficacy','D1':'efficacy','D2':'efficacy','E1':'mechanism','F1':'invivo','F2':'invivo','F3':'invivo','G1':'decision'};
const BLOCK_RECORDS = {'B1':96,'B2':72,'B3':90,'C1':538,'C2':100,'C3':180,'D1':900,'D2':144,'E1':24408,'F1':2160,'F2':525,'F3':576,'G1':1};
const PHASE_ORDER = ['quality','efficacy','mechanism','invivo','decision'];
const PHASE_NAMES = {quality:'① 质量控制', efficacy:'② 成分·靶点', mechanism:'③ 组学', invivo:'④ 体内', decision:'⑤ 决策'};
const PHASE_SUB = {quality:'药材→炮制→检测', efficacy:'成分/靶点/网络药理', mechanism:'转录/蛋白/代谢组', invivo:'动物/药动/药效', decision:'MCDM综合决策'};

function renderPipeline() {
  const canvas = document.getElementById('pipelineCanvas');
  // 按阶段分组的block id顺序
  const phaseBlocks = {};
  PHASE_ORDER.forEach(p => phaseBlocks[p] = []);
  DATA.blocks.forEach(b => {
    const phase = PHASE_MAP[b.id];
    if (phase) phaseBlocks[phase].push(b.id);
  });

  // 构建反馈标签映射：每个block关联哪些反馈
  const fbByBlock = {};
  (DATA.feedbackLoops || []).forEach(fb => {
    [fb.from, fb.to].forEach(bid => {
      if (!fbByBlock[bid]) fbByBlock[bid] = [];
      fbByBlock[bid].push(fb);
    });
  });
  // 审核关卡映射：afterBlock -> gate
  const gateByBlock = {};
  (DATA.reviewGates || []).forEach(g => { gateByBlock[g.afterBlock] = g; });

  // 渲染 5 列
  let html = '<div class="cascade-columns">';
  PHASE_ORDER.forEach((phase, colIdx) => {
    const ids = phaseBlocks[phase];
    const isLast = colIdx === PHASE_ORDER.length - 1;
    html += `<div class="cascade-column">`;
    // 阶段头部
    const totalRecs = ids.reduce((s,id) => s + (BLOCK_RECORDS[id]||0), 0);
    html += `<div class="cascade-phase-head ${phase}">
      <span>${PHASE_NAMES[phase]}</span>
      <span class="phase-num">${PHASE_SUB[phase]}</span>
      <span class="phase-total">${ids.length}块 · ${(totalRecs>999?(totalRecs/1000).toFixed(1)+'k':totalRecs)}条</span>
    </div>`;
    // 卡片列表
    ids.forEach(id => {
      const b = DATA.blocks.find(x => x.id === id);
      if (!b) return;
      const recs = BLOCK_RECORDS[id] || 0;
      const recsText = recs > 999 ? (recs/1000).toFixed(1)+'k' : recs;
      const fbs = fbByBlock[id] || [];
      const gate = gateByBlock[id];
      const isDecision = id === 'G1';

      html += `<div class="${isLast?'':'flow-arrow-col'}">`;
      html += `<div class="data-card ${phase}${isDecision?' decision':''}" onclick="openBlockDrawer('${id}')" data-id="${id}">`;
      // 审核关卡标记
      if (gate) {
        html += `<div class="gate-marker" title="${gate.name}: ${gate.question}" onclick="event.stopPropagation();openBlockDrawer('${id}')">${gate.id.slice(1)}</div>`;
      }
      // 卡片头
      html += `<div class="data-card-head">
        <span class="card-badge">${id}</span>
        <span class="card-records">${recsText}<span class="unit">条</span></span>
      </div>`;
      // 名称
      html += `<div class="card-name">${b.name}</div>`;
      // 反馈标签
      if (fbs.length) {
        html += `<div class="card-feedback-tags">`;
        fbs.forEach(fb => {
          const cls = fb.status === 'triggered' ? 'triggered' : (fb.status === 'resolved' ? 'resolved' : 'pending');
          html += `<span class="fb-tag ${cls}" onclick="event.stopPropagation();openBlockDrawer('${fb.from}')" title="${fb.id}: ${fb.from}⇄${fb.to} ${fb.note}">${fb.id} ${fb.status==='triggered'?'🔴':fb.status==='resolved'?'🟢':'🟡'}</span>`;
        });
        html += `</div>`;
      }
      // 决策卡片特殊：显示决策结果
      if (isDecision) {
        const dec = b.virtualData_summary?.decision || 'GO';
        html += `<div style="margin-top:6px;font-size:12px;font-weight:700;color:${dec==='GO'?'var(--green-bright)':'var(--red)'}">${dec==='GO'?'✅ GO':'❌ NO-GO'}</div>`;
      }
      html += `</div>`;
      html += `</div>`; // flow-arrow-col
    });
    html += `</div>`; // cascade-column
  });
  html += '</div>'; // cascade-columns
  canvas.innerHTML = html;

  // 渲染图例
  const legend = document.getElementById('cascadeLegend');
  if (legend) legend.innerHTML = `
    <div class="leg-item"><span class="leg-color" style="background:var(--quality-bright)"></span>质量控制</div>
    <div class="leg-item"><span class="leg-color" style="background:var(--efficacy)"></span>成分·靶点</div>
    <div class="leg-item"><span class="leg-color" style="background:var(--mechanism)"></span>组学</div>
    <div class="leg-item"><span class="leg-color" style="background:var(--invivo)"></span>体内</div>
    <div class="leg-item"><span class="leg-color" style="background:var(--decision)"></span>决策</div>
    <div class="leg-item"><span style="color:var(--cyan);font-size:14px">→</span> 列间流向</div>
    <div class="leg-item"><span class="fb-tag triggered">FB 🔴</span> 触发反馈</div>
    <div class="leg-item"><span class="fb-tag resolved">FB 🟢</span> 已解除</div>
    <div class="leg-item"><span class="gate-marker" style="position:static">⬡</span> 审核关卡</div>
  `;

  // 渲染反馈回路列表
  document.getElementById('feedbackList').innerHTML = (DATA.feedbackLoops||[]).map(f => {
    const statusColor = f.status==='triggered'?'var(--red)':(f.status==='resolved'?'var(--green-bright)':'var(--text-faint)');
    return `<div class="feedback-list-item">
      <span class="mono" style="color:var(--yellow);font-size:11px;min-width:32px">${f.id}</span>
      <span class="card-badge" style="background:rgba(0,212,255,0.18);color:var(--cyan);cursor:pointer" onclick="openBlockDrawer('${f.from}')">${f.from}</span>
      <span style="color:${statusColor};font-size:16px">⇄</span>
      <span class="card-badge" style="background:rgba(255,215,0,0.18);color:var(--yellow);cursor:pointer" onclick="openBlockDrawer('${f.to}')">${f.to}</span>
      <span class="fb-tag ${f.status==='triggered'?'triggered':(f.status==='resolved'?'resolved':'pending')}" style="font-size:9px">${f.status}</span>
      <span class="faint" style="flex:1;font-size:10px">${f.note||''}</span>
    </div>`;
  }).join('');

  // 审核关卡列表
  document.getElementById('gateList').innerHTML = (DATA.reviewGates||[]).map(g => `
    <div class="gate-list-item">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="width:24px;height:24px;border-radius:50%;background:var(--bg-deep);border:2px solid var(--yellow);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--yellow)">${g.id.slice(1)}</span>
        <strong style="font-size:13px">${g.name}</strong>
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(0,217,126,0.15);color:var(--green-bright);border:1px solid var(--green-bright)">${g.humanDecision}</span>
      </div>
      <div class="faint">📍 ${g.afterBlock} 之后 · ${g.question}</div>
      <div class="muted" style="margin-top:4px;padding-left:32px">🤖 ${g.aiAssessment}</div>
    </div>
  `).join('');
}

// V2：不需要SVG连线
function drawPipelineConnections() {}

// ====== 抽屉 ======
function openBlockDrawer(id) {
  const b = DATA.blocks.find(x=>x.id===id);
  if (!b) return;
  const p = b.ports || {};
  const d = b.virtualData_summary || {};
  const fullData = FULL?.[id] || [];
  let html = `<h2 style="color:var(--cyan)">${b.id} · ${b.name}</h2>`;
  html += `<div class="drawer-q">❓ ${b.question}</div>`;
  html += `<div class="muted" style="margin-bottom:12px">🎯 ${b.goal}<br>🧪 ${b.experiment}</div>`;

  // 端口Schema
  if (p.input) {
    html += `<div class="card-title" style="font-size:13px;margin-top:16px">🔌 端口 Schema</div>`;
    html += `<div class="port-table">`;
    if (p.input.upstream) html += `<div class="port-row"><div class="port-label">📥 上游</div><div class="port-value">${p.input.upstream.join(' · ')}</div></div>`;
    if (p.input.external) html += `<div class="port-row"><div class="port-label">📥 外部</div><div class="port-value">${p.input.external.join(' · ')}</div></div>`;
    if (p.input.schema) html += `<div class="port-row"><div class="port-label">📋 Schema</div><div class="port-value mono">${p.input.schema}</div></div>`;
    if (p.processing?.aiRules) html += `<div class="port-row"><div class="port-label">⚙️ AI规则</div><div class="port-value mono">${p.processing.aiRules.join('<br>')}</div></div>`;
    if (p.processing?.models) html += `<div class="port-row"><div class="port-label">📐 模型</div><div class="port-value mono">${p.processing.models.join(' · ')}</div></div>`;
    if (p.output?.toDownstream) html += `<div class="port-row"><div class="port-label">📤 下游</div><div class="port-value">${p.output.toDownstream.join(' · ')}</div></div>`;
    if (p.output?.toKnowledge) html += `<div class="port-row"><div class="port-label">🧠 →图谱</div><div class="port-value mono">${p.output.toKnowledge.join('<br>')}</div></div>`;
    if (p.output?.feedbackTrigger) html += `<div class="port-row"><div class="port-label">🔄 反馈触发</div><div class="port-value" style="color:var(--red)">${p.output.feedbackTrigger}</div></div>`;
    html += `</div>`;
  }

  // 血缘链
  html += `<div class="card-title" style="font-size:13px;margin-top:16px">🔗 数据血缘链</div>`;
  html += `<div class="lineage-chain">`;
  const upstream = p.input?.upstream || [];
  upstream.forEach(u => {
    const uid = u.match(/([A-G]\d)/)?.[1];
    html += `<span class="lineage-node ${uid?'source':'process'}" ${uid?`onclick="openBlockDrawer('${uid}')"`:''} style="${uid?'cursor:pointer':''}">${u}</span>`;
    html += `<span class="lineage-arrow">→</span>`;
  });
  html += `<span class="lineage-node process">${b.id}</span>`;
  const downstream = p.output?.toDownstream || [];
  if (downstream.length) {
    html += `<span class="lineage-arrow">→</span>`;
    downstream.forEach((ds,i) => {
      const did = ds.match(/([A-G]\d)/)?.[1];
      html += `<span class="lineage-node ${did?'decision':'process'}" ${did?`onclick="openBlockDrawer('${did}')"`:''} style="${did?'cursor:pointer':''}">${ds}</span>`;
      if (i<downstream.length-1) html += `<span class="lineage-arrow">,</span>`;
    });
  }
  html += `</div>`;

  // 数据样本（从full文件取前8条）
  if (fullData.length > 0) {
    const sample = fullData.slice(0, 8);
    const keys = Object.keys(sample[0]).slice(0, 6);
    html += `<div class="card-title" style="font-size:13px;margin-top:16px">📊 数据样本（${fullData.length}条 · 显示前8条）</div>`;
    html += `<div class="data-sample"><table><thead><tr>`;
    keys.forEach(k => html += `<th>${k}</th>`);
    html += `</tr></thead><tbody>`;
    sample.forEach(row => {
      html += `<tr>`;
      keys.forEach(k => {
        let v = row[k];
        if (v === null || v === undefined) v = '—';
        if (typeof v === 'number') v = Number.isInteger(v) ? v : v.toFixed(3);
        if (typeof v === 'string' && v.length > 20) v = v.slice(0,18)+'..';
        html += `<td>${v}</td>`;
      });
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // 数据汇总
  html += `<div class="card-title" style="font-size:13px;margin-top:16px">📈 数据汇总</div>`;
  html += `<div style="font-size:12px;line-height:1.8">`;
  for (let k in d) {
    if (k === 'panels') {
      html += `<div style="margin-top:8px"><strong style="color:var(--cyan)">Panel矩阵:</strong></div>`;
      for (let pn in d.panels) {
        html += `<div style="margin:4px 0;padding:6px;background:rgba(0,137,59,0.06);border-radius:6px">`;
        html += `<strong style="color:var(--green-bright);font-size:11px">${pn}</strong>: `;
        html += `<span style="font-size:10px">${d.panels[pn].join(', ')}</span>`;
        html += `</div>`;
      }
    } else if (typeof d[k] === 'object' && !Array.isArray(d[k])) {
      html += `<div style="margin-top:4px"><strong>${k}:</strong> <code style="font-size:10px;color:var(--green-bright)">${JSON.stringify(d[k]).slice(0,120)}</code></div>`;
    } else {
      html += `<div style="margin-top:2px"><strong>${k}:</strong> ${d[k]}</div>`;
    }
  }
  html += `</div>`;

  document.getElementById('drawerContent').innerHTML = html;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// ========================================
// 视图2：数据底座 · 三层架构
// ========================================
function renderStack() {
  const arch = DATA.architecture;
  document.getElementById('stackLayers').innerHTML = arch.layers.map(l => {
    const cls = l.id.toLowerCase();
    return `<div class="stack-layer ${cls}" onclick="toggleLayerDetail('${l.id}')">
      <div class="stack-badge ${cls}">
        ${l.id}
        <div class="stack-name">${l.name.split('（')[0]}</div>
      </div>
      <div class="stack-body">
        <h3>${l.name.replace(/（.*?）/g,'')}</h3>
        <div class="role">${l.role}</div>
        <div class="stores">${(l.stores||[]).map(s=>`<span class="store-tag">${s}</span>`).join('')}</div>
        <div class="faint" style="margin-bottom:4px">📐 ${l.design}</div>
        <div class="faint">📏 ${l.scale}</div>
        <div id="layerDetail-${l.id}" style="display:none;margin-top:12px"></div>
      </div>
    </div>`;
  }).join('');
}

function toggleLayerDetail(layerId) {
  const el = document.getElementById('layerDetail-'+layerId);
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  el.style.display = 'block';
  if (layerId === 'L1') renderL1Detail(el);
  else if (layerId === 'L2') renderL2Detail(el);
  else if (layerId === 'L3') renderL3Detail(el);
}

function renderL1Detail(el) {
  const total = Object.values(BLOCK_RECORDS).reduce((a,b)=>a+b,0);
  el.innerHTML = `
    <div class="card-title" style="font-size:13px">📊 各切块数据规模（总计 ${total.toLocaleString()} 条 · 点击查看样本）</div>
    <div class="data-dashboard">
      ${Object.entries(BLOCK_RECORDS).map(([id,cnt]) => {
        const pct = (cnt/total*100).toFixed(1);
        const b = DATA.blocks.find(x=>x.id===id);
        const phase = PHASE_MAP[id]||'quality';
        const color = {quality:'var(--cyan)',efficacy:'var(--green-bright)',mechanism:'var(--purple)',invivo:'var(--orange)',decision:'var(--yellow)'}[phase];
        return `<div class="dash-cell" onclick="openBlockDrawer('${id}')">
          <div class="dash-val" style="color:${color};font-size:18px">${cnt>999?(cnt/1000).toFixed(1)+'k':cnt}</div>
          <div class="dash-label">${id} · ${b?.name.slice(0,6)||''}</div>
          <div class="dash-pct">${pct}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="muted" style="margin-top:8px">💡 E1组学数据占比最大（${(BLOCK_RECORDS.E1/total*100).toFixed(0)}%），是AI消费的主力数据源</div>
  `;
}

function renderL2Detail(el) {
  el.innerHTML = `
    <div class="card-title" style="font-size:13px">🕸️ 知识图谱拓扑可视化（节点=实体 · 边=关系 · 点击节点高亮邻居）</div>
    <div class="graph-topology">
      <svg class="graph-svg" id="graphSvg"></svg>
    </div>
    <div class="muted" style="margin-top:8px">
      <strong>节点类型:</strong>
      <span style="color:var(--cyan)">●药材</span>
      <span style="color:var(--green-bright)">●成分</span>
      <span style="color:var(--purple)">●靶点</span>
      <span style="color:var(--orange)">●通路</span>
      <span style="color:var(--yellow)">●切块</span>
    </div>
  `;
  drawKnowledgeGraph();
}

function drawKnowledgeGraph() {
  const svg = document.getElementById('graphSvg');
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const cx = w/2, cy = h/2;

  const nodes = [
    {id:'GQD',type:'recipe',label:'葛根芩连汤',x:cx,y:cy,r:24},
    {id:'B1',type:'block',label:'B1',x:cx-120,y:cy-90,r:13},
    {id:'B3',type:'block',label:'B3',x:cx-90,y:cy+80,r:13},
    {id:'C1',type:'block',label:'C1',x:cx+50,y:cy-110,r:13},
    {id:'E1',type:'block',label:'E1',x:cx+120,y:cy+30,r:16},
    {id:'G1',type:'block',label:'G1',x:cx+70,y:cy+110,r:15},
    {id:'葛根素',type:'compound',label:'葛根素',x:cx-60,y:cy-45,r:11},
    {id:'小檗碱',type:'compound',label:'小檗碱',x:cx-40,y:cy+25,r:11},
    {id:'黄芩苷',type:'compound',label:'黄芩苷',x:cx-80,y:cy,r:11},
    {id:'TGFβ',type:'target',label:'TGF-β1',x:cx+5,y:cy-60,r:11},
    {id:'NLRP3',type:'target',label:'NLRP3',x:cx+25,y:cy-15,r:11},
    {id:'AMPK',type:'target',label:'AMPK',x:cx-5,y:cy+55,r:11},
    {id:'纤维化',type:'pathway',label:'纤维化',x:cx+80,y:cy-50,r:13},
    {id:'炎症',type:'pathway',label:'炎症',x:cx+100,y:cy-5,r:13},
    {id:'DKD',type:'pathway',label:'DKD',x:cx+150,y:cy-70,r:15},
  ];
  const edges = [
    ['GQD','B1'],['GQD','B3'],['B1','葛根素'],['B1','小檗碱'],['B1','黄芩苷'],
    ['B3','葛根素'],['B3','小檗碱'],['B3','黄芩苷'],
    ['葛根素','TGFβ'],['小檗碱','AMPK'],['黄芩苷','NLRP3'],
    ['TGFβ','纤维化'],['NLRP3','炎症'],['AMPK','纤维化'],
    ['纤维化','DKD'],['炎症','DKD'],
    ['C1','TGFβ'],['E1','纤维化'],['G1','DKD'],
  ];
  const colors = {recipe:'#ffd700',block:'#00d97e',compound:'#00d4ff',target:'#a855f7',pathway:'#ff8c42'};

  let content = '';
  edges.forEach(([a,b]) => {
    const na = nodes.find(n=>n.id===a), nb = nodes.find(n=>n.id===b);
    if (na && nb) content += `<line class="graph-edge" data-from="${a}" data-to="${b}" x1="${na.x}" y1="${na.y}" x2="${nb.x}" y2="${nb.y}" />`;
  });
  nodes.forEach(n => {
    content += `<g style="cursor:pointer" onclick="highlightNode('${n.id}')">
      <circle class="graph-node-circle" cx="${n.x}" cy="${n.y}" r="${n.r}" fill="${colors[n.type]}" opacity="0.3" stroke="${colors[n.type]}" stroke-width="2" data-id="${n.id}" />
      <text class="graph-node-label" x="${n.x}" y="${n.y+n.r+10}">${n.label}</text>
    </g>`;
  });
  svg.innerHTML = content;
}

function highlightNode(id) {
  document.querySelectorAll('.graph-edge').forEach(e => e.classList.remove('highlighted'));
  document.querySelectorAll('.graph-node-circle').forEach(c => { c.style.opacity = '0.15'; });
  const linked = new Set([id]);
  document.querySelectorAll('.graph-edge').forEach(e => {
    if (e.dataset.from === id || e.dataset.to === id) {
      e.classList.add('highlighted');
      linked.add(e.dataset.from); linked.add(e.dataset.to);
    }
  });
  linked.forEach(lid => {
    const c = document.querySelector(`.graph-node-circle[data-id="${lid}"]`);
    if (c) c.style.opacity = '0.9';
  });
}

// ========================================
// 视图3：MCDM预测引擎 · 可调参沙盘
// ========================================
let mcdmState = null;
let engineParams = {
  multiOmicsConsistency: 0.48,
  novelPathwaySensitivity: 0.7,
  efficacyWeight: 0.85,
};

function renderEngine() {
  const g1 = DATA.blocks.find(b=>b.id==='G1');
  const tiers = g1.virtualData_summary.mcdm_tiers;
  mcdmState = JSON.parse(JSON.stringify({
    L1_veto: tiers.L1_veto.map(d=>({name:d.name,score:d.score,weight:d.weight,evidence:d.evidence,verdict:d.verdict})),
    L2_core: tiers.L2_core.map(d=>({...d})),
    L3_commercial: tiers.L3_commercial.map(d=>({...d})),
  }));

  // 滑块面板
  let html = '';
  const tierConfig = [
    {key:'L1_veto',cls:'tier-l1',label:'🚫 L1 一票否决层（任一<4分→No-Go）',isVeto:true},
    {key:'L2_core',cls:'tier-l2',label:'⭐ L2 核心价值层'},
    {key:'L3_commercial',cls:'tier-l3',label:'💼 L3 商业价值层'},
  ];
  tierConfig.forEach(tc => {
    html += `<div class="slider-group ${tc.cls}"><h4>${tc.label}</h4>`;
    mcdmState[tc.key].forEach((d,i) => {
      const rowCls = tc.key==='L1_veto'?'l1':(tc.key==='L2_core'?'l2':'l3');
      html += `<div class="slider-row ${rowCls}">
        <span title="${d.evidence||''}">${d.name}</span>
        <input type="range" min="0" max="10" step="0.1" value="${d.score}" oninput="updateScore('${tc.key}',${i},this.value)" />
        <span class="score-val" id="score-${tc.key}-${i}" style="color:var(--${tc.key==='L1_veto'?'red':(tc.key==='L2_core'?'cyan':'purple')})">${d.score.toFixed(1)}</span>
        <span class="weight-val">${typeof d.weight==='number'?d.weight+'%':'否决'}</span>
      </div>`;
    });
    html += `</div>`;
  });
  // 预设按钮（注入到 presetBtns）
  const presetHtml = `
    <div class="preset-btns" style="display:flex">
      <button class="preset-btn active" onclick="loadPreset('baseline',this)">📊 基准值</button>
      <button class="preset-btn" onclick="loadPreset('optimistic',this)">🚀 乐观（+10%）</button>
      <button class="preset-btn" onclick="loadPreset('pessimistic',this)">⚠️ 悲观（-15%）</button>
      <button class="preset-btn" onclick="loadPreset('worst',this)">💀 最差（毒理否决）</button>
    </div>
  `;
  html += presetHtml;
  document.getElementById('sliderPanel').innerHTML = html;
  // presetBtns 显示出来（sliderPanel 已含，这里隐藏占位）
  document.getElementById('presetBtns').style.display = 'none';

  recalculate();
}

function updateScore(tier, idx, val) {
  mcdmState[tier][idx].score = parseFloat(val);
  document.getElementById(`score-${tier}-${idx}`).textContent = parseFloat(val).toFixed(1);
  recalculate();
}

function updateEngineParam(key, val) {
  engineParams[key] = parseFloat(val);
  // V2侧边栏未单独显示引擎参数，保留函数兼容性
  recalculate();
}

function recalculate() {
  const vetoed = mcdmState.L1_veto.find(d => d.score < 4);
  const l2Score = mcdmState.L2_core.reduce((s,d)=>s+d.score*d.weight/100,0);
  const l2Max = mcdmState.L2_core.reduce((s,d)=>s+10*d.weight/100,0);
  const l3Score = mcdmState.L3_commercial.reduce((s,d)=>s+d.score*d.weight/100,0);
  const l3Max = mcdmState.L3_commercial.reduce((s,d)=>s+10*d.weight/100,0);
  const l2Norm = l2Score/l2Max*55;
  const l3Norm = l3Score/l3Max*45;
  const total = vetoed ? 0 : l2Norm+l3Norm;
  const decision = vetoed ? 'NO-GO' : (total >= 70 ? 'GO' : 'NO-GO');

  document.getElementById('scorePanel').innerHTML = `
    <div class="score-display">
      <div class="score-label">实时综合评分（L2+L3归一化）</div>
      <div class="score-big">${total.toFixed(1)}</div>
      <div class="score-verdict ${decision==='GO'?'go':'nogo'}">${decision === 'GO' ? '✅ GO' : '❌ NO-GO'}</div>
      ${vetoed ? `<div style="color:var(--red);font-size:11px;margin-top:6px">⚠️ L1否决触发: ${vetoed.name} = ${vetoed.score.toFixed(1)} &lt; 4</div>` : ''}
    </div>
    <div class="score-breakdown">
      <div class="score-breakdown-item">
        <div class="faint">L1否决</div>
        <div class="score-breakdown-val" style="color:${vetoed?'var(--red)':'var(--green-bright)'}">${vetoed?'FAIL':'PASS'}</div>
      </div>
      <div class="score-breakdown-item">
        <div class="faint">L2核心</div>
        <div class="score-breakdown-val" style="color:var(--cyan)">${l2Norm.toFixed(1)}</div>
        <div class="faint">/55</div>
      </div>
      <div class="score-breakdown-item">
        <div class="faint">L3商业</div>
        <div class="score-breakdown-val" style="color:var(--purple)">${l3Norm.toFixed(1)}</div>
        <div class="faint">/45</div>
      </div>
    </div>
  `;
  drawRadar();
}

function drawRadar() {
  const canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 200, cy = 200, R = 130;
  ctx.clearRect(0,0,400,400);

  const dims = [...mcdmState.L2_core, ...mcdmState.L3_commercial].slice(0,8);
  const n = dims.length;
  const labels = dims.map(d=>d.name.slice(0,4));
  const scores = dims.map(d=>d.score);
  const maxScores = dims.map(d=>10);

  for (let ring = 1; ring <= 5; ring++) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = -Math.PI/2 + i*2*Math.PI/n;
      const r = R*ring/5;
      const x = cx+Math.cos(angle)*r, y = cy+Math.sin(angle)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle = 'rgba(0,137,59,0.1)';
    ctx.lineWidth = 1; ctx.stroke();
  }
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI/2 + i*2*Math.PI/n;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*R, cy+Math.sin(angle)*R);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke();
  }
  ctx.beginPath();
  scores.forEach((s,i) => {
    const angle = -Math.PI/2 + i*2*Math.PI/n;
    const r = R*s/maxScores[i];
    const x = cx+Math.cos(angle)*r, y = cy+Math.sin(angle)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,212,255,0.15)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,212,255,0.6)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.font = '11px Microsoft YaHei';
  ctx.fillStyle = 'rgba(226,232,240,0.7)';
  scores.forEach((s,i) => {
    const angle = -Math.PI/2 + i*2*Math.PI/n;
    const x = cx+Math.cos(angle)*(R+18), y = cy+Math.sin(angle)*(R+18)+4;
    ctx.textAlign = Math.abs(Math.cos(angle))<0.3?'center':(Math.cos(angle)>0?'left':'right');
    ctx.fillText(labels[i], x, y);
  });
}

function loadPreset(name, btn) {
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const g1 = DATA.blocks.find(b=>b.id==='G1');
  const orig = g1.virtualData_summary.mcdm_tiers;
  const adj = {baseline:1, optimistic:1.1, pessimistic:0.85, worst:0.5}[name];
  ['L1_veto','L2_core','L3_commercial'].forEach(tier => {
    mcdmState[tier].forEach((d,i) => {
      d.score = Math.max(0, Math.min(10, orig[tier][i].score * adj));
      document.getElementById(`score-${tier}-${i}`).textContent = d.score.toFixed(1);
      const inputs = document.querySelectorAll(`#sliderPanel .slider-group.tier-${tier==='L1_veto'?'l1':(tier==='L2_core'?'l2':'l3')} input[type=range]`);
      if (inputs[i]) inputs[i].value = d.score;
    });
  });
  recalculate();
}
