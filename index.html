<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杏林智眼 · SJP 数据治理指挥中心 V5.0</title>
<style>

:root {
  --bg: #0a0e1a; --panel: #111827; --card: #1e293b;
  --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8;
  --accent: #06b6d4; --accent2: #8b5cf6; --success: #10b981;
  --warning: #f59e0b; --danger: #ef4444;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); overflow-x:hidden; }

/* HEADER */
.header { position:sticky; top:0; z-index:100; background:rgba(10,14,26,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:18px; font-weight:600; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .stats { display:flex; gap:24px; }
.header .stat-item { text-align:center; }
.header .stat-item .val { font-size:20px; font-weight:700; font-family:var(--mono); }
.header .stat-item .lbl { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }

/* KPI ROW */
.kpi-row { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; padding:16px 24px; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; position:relative; overflow:hidden; cursor:pointer; transition:all 0.3s; }
.kpi-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.kpi-card .kpi-val { font-size:28px; font-weight:800; font-family:var(--mono); }
.kpi-card .kpi-lbl { font-size:11px; color:var(--text-dim); margin-top:4px; }
.kpi-card .kpi-icon { position:absolute; right:12px; top:12px; font-size:24px; opacity:0.3; }
.kpi-card.real { border-left:3px solid var(--success); }
.kpi-card.virtual { border-left:3px solid var(--accent2); }
.kpi-card.format { border-left:3px solid var(--accent); }
.kpi-card.modality { border-left:3px solid var(--warning); }

/* MAIN LAYOUT */
.main { display:grid; grid-template-columns:1fr 360px; gap:16px; padding:0 24px 24px; }

/* PIPELINE */
.pipeline-section { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; }
.pipeline-section h2 { font-size:14px; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:16px; }
.stage-row { margin-bottom:12px; }
.stage-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer; }
.stage-badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; color:white; }
.stage-name { font-size:13px; font-weight:600; }
.stage-count { font-size:11px; color:var(--text-dim); }
.modules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; }

/* MODULE CARD */
.module-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; cursor:pointer; transition:all 0.2s; position:relative; }
.module-card:hover { border-color:var(--accent); box-shadow:0 0 20px rgba(6,182,212,0.15); }
.module-card.has-real { border-left:3px solid var(--success); }
.module-card .mc-code { font-size:10px; color:var(--text-dim); font-family:var(--mono); }
.module-card .mc-title { font-size:12px; font-weight:600; margin:2px 0 6px; line-height:1.3; }
.module-card .mc-stats { display:flex; gap:6px; flex-wrap:wrap; }
.module-card .mc-tag { font-size:9px; padding:1px 6px; border-radius:3px; font-family:var(--mono); color:white; }
.module-card .mc-real-badge { position:absolute; top:8px; right:8px; font-size:8px; padding:1px 5px; border-radius:3px; background:var(--success); color:white; font-weight:700; }

/* SIDEBAR */
.sidebar { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; position:sticky; top:80px; max-height:calc(100vh - 100px); overflow-y:auto; }
.sidebar h2 { font-size:14px; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; }

/* FORMAT DISTRIBUTION */
.fmt-chart { display:flex; flex-direction:column; gap:4px; margin-bottom:20px; }
.fmt-row { display:flex; align-items:center; gap:8px; }
.fmt-label { width:70px; font-size:10px; font-family:var(--mono); text-align:right; color:var(--text-dim); }
.fmt-bar-bg { flex:1; height:16px; background:var(--card); border-radius:4px; overflow:hidden; }
.fmt-bar-fill { height:100%; border-radius:4px; transition:width 0.5s; }
.fmt-count { width:30px; font-size:10px; font-family:var(--mono); color:var(--text); }

/* PARAMETER PANEL */
.param-section { margin-bottom:20px; }
.param-section h3 { font-size:12px; font-weight:600; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.param-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.param-label { flex:1; font-size:11px; color:var(--text-dim); }
.param-slider { flex:2; -webkit-appearance:none; appearance:none; height:4px; background:var(--border); border-radius:2px; outline:none; cursor:pointer; }
.param-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; cursor:pointer; }
.param-val { width:36px; font-size:11px; font-family:var(--mono); text-align:right; font-weight:600; }
.param-veto .param-slider::-webkit-slider-thumb { background:var(--danger) !important; }
.param-science .param-slider::-webkit-slider-thumb { background:var(--accent) !important; }
.param-decision .param-slider::-webkit-slider-thumb { background:var(--accent2) !important; }

/* SCORE DISPLAY */
.score-display { background:var(--card); border-radius:12px; padding:16px; margin-bottom:16px; }
.score-total { font-size:36px; font-weight:800; font-family:var(--mono); text-align:center; background:linear-gradient(135deg,var(--accent),var(--success)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.score-label { text-align:center; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-top:4px; }
.score-breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.score-item { text-align:center; padding:8px; border-radius:8px; background:var(--panel); }
.score-item .si-val { font-size:18px; font-weight:700; font-family:var(--mono); }
.score-item .si-lbl { font-size:9px; color:var(--text-dim); margin-top:2px; }

/* AI SUGGESTION */
.ai-suggestion { background:linear-gradient(135deg,rgba(6,182,212,0.1),rgba(139,92,246,0.1)); border:1px solid rgba(6,182,212,0.3); border-radius:8px; padding:12px; margin-top:12px; font-size:11px; line-height:1.5; }
.ai-suggestion .ai-tag { display:inline-block; font-size:9px; padding:1px 6px; border-radius:3px; background:var(--accent); color:var(--bg); font-weight:700; margin-bottom:4px; }

/* DECISION LOG */
.decision-log { max-height:200px; overflow-y:auto; }
.decision-entry { padding:8px; border-left:2px solid var(--border); margin-bottom:6px; font-size:11px; }
.decision-entry .de-time { font-size:9px; color:var(--text-dim); }
.decision-entry .de-action { font-weight:600; margin:2px 0; }
.decision-entry .de-detail { color:var(--text-dim); }

/* DRAWER */
.drawer-overlay { position:fixed; top:0; right:0; width:480px; height:100vh; background:var(--panel); border-left:1px solid var(--border); z-index:200; transform:translateX(100%); transition:transform 0.3s; overflow-y:auto; }
.drawer-overlay.open { transform:translateX(0); }
.drawer-header { padding:20px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); z-index:10; }
.drawer-content { padding:20px; }
.drawer-section { margin-bottom:20px; }
.drawer-section h3 { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }

/* FORMAT BADGE in drawer */
.fmt-badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:4px; font-family:var(--mono); color:white; margin:2px; }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

/* RESPONSIVE */
@media (max-width:1200px) { .main { grid-template-columns:1fr; } .sidebar { position:static; max-height:none; } .kpi-row { grid-template-columns:repeat(3,1fr); } }
@media (max-width:768px) { .kpi-row { grid-template-columns:repeat(2,1fr); } .header .stats { display:none; } }

</style>
</head>

<!-- HEADER -->
<div class="header">
  <h1>杏林智眼 · SJP 数据治理指挥中心 V5.0</h1>
  <div class="stats">
    <div class="stat-item"><div class="val" style="color:var(--accent)">66</div><div class="lbl">模块</div></div>
    <div class="stat-item"><div class="val" style="color:var(--success)">41</div><div class="lbl">真实数据</div></div>
    <div class="stat-item"><div class="val" style="color:var(--accent2)">1819</div><div class="lbl">虚拟数据</div></div>

</div>

    <div style="display:flex;gap:6px;margin-bottom:16px;">

    <h3 style="font-size:12px;font-weight:600;margin-bottom:8px;">📝 决策日志</h3>
    <div id="decision-log" class="decision-log"></div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer">
  <div class="drawer-header">
    <div style="display:flex;justify-content:space-between;align-items:center;">

  getAISuggestion(dimName, oldVal, newVal, layer) {
    const delta = newVal - oldVal;
    if (Math.abs(delta) < 0.1) return null;

    const suggestions = [];

    // L1否决层调整
    if (layer === 'L1') {
      if (newVal < this.thresholds.veto) {
        return '⚠️ 警告：' + dimName + '已低于否决阈值(' + this.thresholds.veto + ')，将触发一票否决！全流程数据不合格。';
      }
      if (delta < -1) {
        return '⚠️ ' + dimName + '大幅下调。建议检查该维度对应的原始数据质量——是否有仪器校准异常、数据缺失或格式不合规？';
      }
      if (delta > 1) {
        return '✅ ' + dimName + '提升。该维度数据质量良好，可作为流程标杆。';
      }
    }

    // L2科学层调整
    if (layer === 'L2') {
      if (delta < -1.5) {
        suggestions.push('检测到' + dimName + '显著下调(' + delta.toFixed(1) + ')');
        if (dimName.includes('统计') || dimName.includes('重复')) {
          suggestions.push('建议核查样本量是否满足统计功效要求（通常n≥6/组）');
        }
        if (dimName.includes('批次')) {
          suggestions.push('批次效应通常源于试剂批号差异、操作者不同或仪器漂移，建议引入ComBat校正');
        }
        if (dimName.includes('多组学')) {
          suggestions.push('多组学一致性低提示不同平台数据存在系统偏差，建议做跨平台标准化');
        }
        return suggestions.join('。 ');
      }
      if (delta > 1.5) {
        return '✅ ' + dimName + '评分提升。该维度达到优质水平，数据可用于注册申报支撑。';
      }
    }

    // L3决策层调整
    if (layer === 'L3') {
      if (dimName.includes('GLP') && newVal < 7) {
        return '⚠️ GLP合规等级偏低。若计划进入IND申报，GLP等级必须≥8。建议补充SOP文件、仪器3Q认证和审计追踪。';
      }
      if (dimName.includes('风险') && newVal > 8) {
        return '风险容忍度高意味着接受较大不确定性。建议同步启动备选方案设计（Plan B/C）。';
      }
      if (dimName.includes('临床转化') && delta > 1) {
        return '🎯 临床转化潜力评分提升。建议同步规划专利布局和转化路径（License-out/Spin-off）。';
      }
      if (delta < -1.5) {
        return '检测到' + dimName + '下调。总分已降低' + (Math.abs(delta) * 0.4).toFixed(1) + '分，请评估是否影响GO/NO-GO决策。';
      }
    }

    return dimName + '从' + oldVal.toFixed(1) + '调整至' + newVal.toFixed(1) + '。';
  },

  // 场景预设
  applyPreset(preset) {
    const presets = {
      optimistic: { L1: 9.5, L2: 8.5, L3: 8.0 },
      conservative: { L1: 7.0, L2: 6.5, L3: 6.0 },
      worst: { L1: 5.0, L2: 4.0, L3: 3.5 },
      current: null  // 从数据库恢复
    };
    const p = presets[preset];
    if (!p) return;

    this.params.L1_veto.forEach(d => d.score = p.L1);
    this.params.L2_science.forEach(d => d.score = p.L2);
    this.params.L3_decision.forEach(d => d.score = p.L3);
    this.calculate();
    UI.renderParams();
    UI.renderScores();
    UI.updateAISuggestion('📊 已应用预设场景：' + ({optimistic:'乐观',conservative:'保守',worst:'最差',current:'默认'}[preset]) + '。所有维度已批量调整，请检查各项指标变化。');
  }
};

// ===== UI渲染 =====
const UI = {
  init() {
    ParamEngine.init(D);
    this.renderKPI();
    this.renderPipeline();
    this.renderFmtDist();
    this.renderParams();
    this.renderScores();
    this.renderDecisions();
    this.bindEvents();
  },

  renderKPI() {
    document.getElementById('kpi-modules').textContent = D.experiments.length;
    document.getElementById('kpi-files').textContent = D.total_files;
    document.getElementById('kpi-real').textContent = D.real_files;
    document.getElementById('kpi-virtual').textContent = D.virtual_files;
    document.getElementById('kpi-formats').textContent = Object.keys(D.fmt_mod_dist || {}).length;
    const mods = D.modality_dist || {};
    document.getElementById('kpi-modalities').textContent = Object.keys(mods).length;
  },

  renderPipeline() {
    const container = document.getElementById('pipeline-container');
    const stages = {};
    D.experiments.forEach(e => {
      const s = e.stage || 'S0';
      if (!stages[s]) stages[s] = [];
      stages[s].push(e);
    });

    let html = '';
    const stageOrder = ['S0','S1','S2','S3','S4','S5','S6','S7'];
    const stageNames = {S0:'立项决策',S1:'药学开发',S2:'质量标准',S3:'药效评价',S4:'安全性评价',S5:'AI预测',S6:'整合分析',S7:'注册申报'};
    const stageColors = {S0:'#6366f1',S1:'#0ea5e9',S2:'#06b6d4',S3:'#10b981',S4:'#f59e0b',S5:'#ec4899',S6:'#8b5cf6',S7:'#ef4444'};

    stageOrder.forEach(s => {
      if (!stages[s]) return;
      const exps = stages[s];
      let modHtml = '';
      exps.forEach(e => {
        const stats = e.stats || {};
        const realCount = (stats.raw_real||0) + (stats.proc_real||0) + (stats.rep_real||0);
        const virtCount = (stats.raw_virt||0) + (stats.proc_virt||0) + (stats.rep_virt||0);
        const hasReal = realCount > 0;
        const formats = stats.formats || {};
        let tags = '';
        Object.entries(formats).sort((a,b)=>b[1]-a[1]).slice(0,4).forEach(([f,c]) => {
          const fc = ({csv:'#3b82f6','csv.gz':'#2563eb',xlsx:'#1d4ed8',sas7bdat:'#1e40af',jpg:'#ec4899',png:'#db2777',docx:'#6366f1',pdf:'#4f46e5',md:'#4338ca',edf:'#f59e0b',fcs:'#d97706','fastq.gz':'#10b981',idat:'#059669',raw:'#10b981',sdf:'#8b5cf6',pdb:'#7c3aed',pdbqt:'#6d28d9',mol2:'#5b21b6',tif:'#be185d',ndpi:'#9d174d',svs:'#831843',czi:'#500724',txt:'#3730a3'})[f] || '#64748b';
          tags += '<span class="mc-tag" style="background:' + fc + '">' + f + '(' + c + ')</span>';
        });
        modHtml += '<div class="module-card' + (hasReal?' has-real':'') + '" onclick="UI.openDrawer(\'' + e.module_code + '\')">' +
          (hasReal ? '<span class="mc-real-badge">REAL ' + realCount + '</span>' : '') +
          '<div class="mc-code">' + e.module_code + '</div>' +
          '<div class="mc-title">' + (e.title||'').replace(e.module_code+'_','') + '</div>' +
          '<div class="mc-stats">' + tags + '</div>' +
          '<div style="font-size:9px;color:var(--text-dim);margin-top:4px;">raw:' + (stats.raw_real+stats.raw_virt) + ' / proc:' + (stats.proc_real+stats.proc_virt) + ' / rep:' + (stats.rep_real+stats.rep_virt) + '</div>' +
        '</div>';
      });

      html += '<div class="stage-row">' +
        '<div class="stage-header"><span class="stage-badge" style="background:' + stageColors[s] + '">' + s + '</span>' +
        '<span class="stage-name">' + stageNames[s] + '</span>' +
        '<span class="stage-count">' + exps.length + ' modules</span></div>' +
        '<div class="modules-grid">' + modHtml + '</div>' +
      '</div>';
    });

    container.innerHTML = html;
  },

  renderFmtDist() {
    const container = document.getElementById('fmt-dist');
    const dist = D.fmt_mod_dist || {};
    const entries = Object.entries(dist).sort((a,b) => (b[1].count||0) - (a[1].count||0));
    const maxCount = Math.max(...entries.map(e => e[1].count || 0), 1);
    let html = '';
    entries.forEach(([fmt, info]) => {
      const c = info.count || 0;
      const fc = ({csv:'#3b82f6','csv.gz':'#2563eb',xlsx:'#1d4ed8',sas7bdat:'#1e40af',jpg:'#ec4899',png:'#db2777',docx:'#6366f1',pdf:'#4f46e5',md:'#4338ca',edf:'#f59e0b',fcs:'#d97706','fastq.gz':'#10b981',idat:'#059669',raw:'#10b981',sdf:'#8b5cf6',pdb:'#7c3aed',pdbqt:'#6d28d9',mol2:'#5b21b6',tif:'#be185d',ndpi:'#9d174d',svs:'#831843',czi:'#500724',txt:'#3730a3'})[fmt] || '#64748b';
      const pct = (c / maxCount * 100).toFixed(0);
      html += '<div class="fmt-row">' +
        '<span class="fmt-label">.' + fmt + '</span>' +
        '<div class="fmt-bar-bg"><div class="fmt-bar-fill" style="width:' + pct + '%;background:' + fc + '"></div></div>' +
        '<span class="fmt-count">' + c + '</span>' +
      '</div>';
    });
    container.innerHTML = html;
  },

  renderParams() {
    const layers = [
      { id: 'L1_veto', cls: 'param-veto', data: ParamEngine.params.L1_veto, name: 'L1 否决层', color: '#ef4444', max: 10, step: 0.5 },
      { id: 'L2_science', cls: 'param-science', data: ParamEngine.params.L2_science, name: 'L2 科学质量层', color: '#06b6d4', max: 10, step: 0.5 },
      { id: 'L3_decision', cls: 'param-decision', data: ParamEngine.params.L3_decision, name: 'L3 决策支持层', color: '#8b5cf6', max: 10, step: 0.5 }
    ];

    layers.forEach(layer => {
      const container = document.getElementById('param-' + layer.id);
      if (!container) return;
      let html = '';
      layer.data.forEach((d, i) => {
        html += '<div class="param-row ' + layer.cls + '">' +
          '<span class="param-label">' + d.name + (d.weight ? ' <span style="opacity:0.5;font-size:9px">w=' + d.weight + '</span>' : '') + '</span>' +
          '<input type="range" class="param-slider" min="0" max="' + layer.max + '" step="' + layer.step + '" value="' + d.score + '" ' +
          'oninput="UI.onParamChange(\'' + layer.id + '\',' + i + ',\'' + d.name + '\',this.value)" ' +
          'style="background:linear-gradient(to right,' + layer.color + ' ' + (d.score*10) + '%,var(--border) ' + (d.score*10) + '%)"' +
          '>' +
          '<span class="param-val" id="pv-' + layer.id + '-' + i + '">' + d.score.toFixed(1) + '</span>' +
        '</div>';
      });
      container.innerHTML = html;
    });
  },

  onParamChange(layerId, idx, dimName, val) {
    const v = parseFloat(val);
    const old = ParamEngine.params[layerId][idx].score;
    ParamEngine.params[layerId][idx].score = v;
    ParamEngine.calculate();

    // 更新滑块颜色
    const slider = event.target;
    const layer = layerId === 'L1_veto' ? '#ef4444' : (layerId === 'L2_science' ? '#06b6d4' : '#8b5cf6');
    slider.style.background = 'linear-gradient(to right,' + layer + ' ' + (v*10) + '%,var(--border) ' + (v*10) + '%)';

    // 更新数值显示
    document.getElementById('pv-' + layerId + '-' + idx).textContent = v.toFixed(1);

    // 更新分数
    this.renderScores();

    // AI建议
    const layerKey = layerId.split('_')[0];
    const suggestion = ParamEngine.getAISuggestion(dimName, old, v, layerKey);
    if (suggestion) this.updateAISuggestion(suggestion);
  },

  renderScores() {
    const s = ParamEngine.scores;
    document.getElementById('score-total').textContent = s.total.toFixed(1);
    document.getElementById('score-l1').textContent = s.L1 === 0 ? 'VETO' : s.L1.toFixed(0);
    document.getElementById('score-l2').textContent = s.L2.toFixed(1);
    document.getElementById('score-l3').textContent = s.L3.toFixed(1);

    const verdictEl = document.getElementById('score-verdict');
    if (s.verdict === 'VETO') {
      verdictEl.textContent = '❌ 一票否决';
      verdictEl.style.color = '#ef4444';
    } else if (s.verdict === 'PASS') {
      verdictEl.textContent = '✅ 通过';
      verdictEl.style.color = '#10b981';
    } else {
      verdictEl.textContent = '⚠️ 需人工评审';
      verdictEl.style.color = '#f59e0b';
    }
  },

  updateAISuggestion(text) {
    const el = document.getElementById('ai-suggestion-text');
    el.innerHTML = '<span class="ai-tag">AI</span> ' + text;
    el.parentElement.style.display = 'block';
  },

  renderDecisions() {
    const container = document.getElementById('decision-log');
    if (!D.decisions || !D.decisions.length) {
      container.innerHTML = '<div style="font-size:11px;color:var(--text-dim)">暂无决策记录</div>';
      return;
    }
    let html = '';
    D.decisions.slice().reverse().slice(0, 10).forEach(d => {
      html += '<div class="decision-entry" style="border-color:' + (d.actor==='AI_agent'?'var(--accent)':d.actor==='expert'?'var(--warning)':'var(--text-dim)') + '">' +
        '<div class="de-time">' + (d.timestamp||'').substring(0,19) + ' · ' + (d.actor||'system') + '</div>' +
        '<div class="de-action">' + (d.action||'') + '</div>' +
        '<div class="de-detail">' + (d.details||'') + '</div>' +
        (d.ai_suggestion ? '<div style="color:var(--accent);font-size:10px;margin-top:2px;">💡 ' + d.ai_suggestion + '</div>' : '') +
      '</div>';
    });
    container.innerHTML = html;
  },

  // Drawer
  openDrawer(moduleCode) {
    const exp = D.experiments.find(e => e.module_code === moduleCode);
    if (!exp) return;
    const drawer = document.getElementById('drawer');
    const content = document.getElementById('drawer-content');
    const stats = exp.stats || {};

    let fmtHtml = '';
    (exp.raw_formats || []).forEach(rf => {
      const fc = ({csv:'#3b82f6','csv.gz':'#2563eb',xlsx:'#1d4ed8',sas7bdat:'#1e40af',jpg:'#ec4899',png:'#db2777',docx:'#6366f1',pdf:'#4f46e5',md:'#4338ca',edf:'#f59e0b',fcs:'#d97706','fastq.gz':'#10b981',idat:'#059669',raw:'#10b981',sdf:'#8b5cf6',pdb:'#7c3aed',pdbqt:'#6d28d9',mol2:'#5b21b6',tif:'#be185d',ndpi:'#9d174d',svs:'#831843',czi:'#500724',txt:'#3730a3'})[rf.format] || '#64748b';
      fmtHtml += '<div style="margin-bottom:8px;padding:8px;background:var(--card);border-radius:6px;">' +
        '<span class="fmt-badge" style="background:' + fc + '">.' + rf.format + '</span> ' +
        '<span style="font-size:10px;color:var(--text-dim)">[' + (rf.modality||'') + ']</span>' +
        '<div style="font-size:11px;margin-top:4px;">' + (rf.description||'') + '</div>' +
        '<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">📡 ' + (rf.instrument||'N/A') + '</div>' +
        '<div style="font-size:10px;color:var(--text-dim);">📋 ' + (rf.naming_convention||'N/A') + '</div>' +
        '</div>';
    });

    const realCount = (stats.raw_real||0)+(stats.proc_real||0)+(stats.rep_real||0);

    content.innerHTML =
      '<div class="drawer-section">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<div><div style="font-size:10px;color:var(--text-dim);font-family:var(--mono)">' + exp.module_code + '</div>' +
          '<h2 style="font-size:16px;font-weight:700;margin-top:4px;">' + (exp.title||'').replace(exp.module_code+'_','') + '</h2></div>' +
          '<span class="stage-badge" style="background:' + ({S0:'#6366f1',S1:'#0ea5e9',S2:'#06b6d4',S3:'#10b981',S4:'#f59e0b',S5:'#ec4899',S6:'#8b5cf6',S7:'#ef4444'}[exp.stage]||'#64748b') + '">' + exp.stage + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="drawer-section">' +
        '<h3>📊 数据统计</h3>' +
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">' +
          '<div class="score-item"><div class="si-val">' + (stats.raw_real+stats.raw_virt) + '</div><div class="si-lbl">Raw层</div></div>' +
          '<div class="score-item"><div class="si-val">' + (stats.proc_real+stats.proc_virt) + '</div><div class="si-lbl">Processed层</div></div>' +
          '<div class="score-item"><div class="si-val">' + (stats.rep_real+stats.rep_virt) + '</div><div class="si-lbl">Report层</div></div>' +
        '</div>' +
        (realCount > 0 ? '<div style="margin-top:8px;padding:8px;border-radius:6px;background:rgba(16,185,129,0.1);border:1px solid var(--success);font-size:11px;">✅ 该模块有 <strong>' + realCount + '</strong> 个真实数据文件</div>' : '<div style="margin-top:8px;padding:8px;border-radius:6px;background:rgba(139,92,246,0.1);font-size:11px;color:var(--text-dim);">该模块暂无真实数据，仅有虚拟生成数据</div>') +
      '</div>' +
      '<div class="drawer-section">' +
        '<h3>📁 原始数据格式规范</h3>' +
        '<div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">实验类型：' + (exp.experiment_type||'document_only') + ' · GLP级别：' + (exp.glp_level||'exploratory') + '</div>' +
        fmtHtml +
      '</div>';

    drawer.classList.add('open');
  },

  closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
  },

  bindEvents() {
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') this.closeDrawer();
    });
  }
};

// ===== 启动 =====
document.addEventListener('DOMContentLoaded', () => UI.init());

</script>
